server:
  port: 8080

spring:
  application:
    name: subastas-api
  datasource:
    # Host/puerto de la base por variables de entorno. DB_HOST = IP del contenedor.
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/subastas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires
    username: ${DB_USER:subastas}
    password: ${DB_PASS:subastas}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none           # el esquema lo maneja 01_schema.sql (TP). Hibernate NO lo toca.
      naming:
        # NO convertir camelCase a snake_case: las columnas del TP son camelCase.
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

# Configuracion propia de la app
app:
  jwt:
    secret: ${JWT_SECRET:cambia-esta-clave-super-secreta-de-al-menos-32-bytes-para-HS256}
    access-token-minutes: 30
    refresh-token-days: 7
  cors:
    allowed-origins: "*"     # en produccion restringir al dominio del front

logging:
  level:
    org.springframework.security: INFO
    com.subastas.api: DEBUG
