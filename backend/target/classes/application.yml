server:
  port: 8080

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  application:
    name: subastas-api
  datasource:
    # Host/puerto de la base por variables de entorno. DB_HOST = IP del contenedor.
    url: jdbc:mysql://${DB_HOST:192.168.0.37}:${DB_PORT:3306}/subastas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires
    username: subastas_app
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none           # el esquema lo maneja 01_schema.sql (TP). Hibernate NO lo toca.
      naming:
        # NO convertir camelCase a snake_case: las columnas del TP son camelCase.
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
app:
  inspeccion:
    direccion: ${INSPECTION_ADDRESS:Av. del Puerto 1450, Depósito 3, CABA}

  seguro:
    compania: ${INSURANCE_COMPANY:Aseguradora Río de la Plata}
    tasa-premio: ${INSURANCE_PREMIUM_RATE:0.02}

  entregas:
    costo-envio-ars: ${SHIPPING_COST_ARS:15000}
    costo-envio-usd: ${SHIPPING_COST_USD:50}

  jwt:
    secret: ${JWT_SECRET:clave-super-secreta-de-al-menos-32-bytes-para-HS256}
    access-token-minutes: 30
    refresh-token-days: 7

  cors:
    allowed-origins: "*"

  email:
    provider: ${MAIL_PROVIDER:dev}
    api-key: ${MAILTRAP_API_KEY:${RESEND_API_KEY:}}
    api-url: ${MAIL_API_URL:}
    from-email: ${MAIL_FROM:mailtrap@demomailtrap.co}
    from-name: ${MAIL_FROM_NAME:Bidster}
    test-to-email: ${MAIL_TEST_TO:}

logging:
  level:
    org.springframework.security: INFO
    com.subastas.api: DEBUG
